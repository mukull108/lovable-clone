spring:
  application:
    name: lovable-clone

  #database config
  datasource:
    url: jdbc:postgresql://localhost:5432/lovabledb
    username:
    password:
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

